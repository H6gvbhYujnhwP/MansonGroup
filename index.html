    <style>
      /* CTA Banner Styles */
      .cta-banner {
        background: linear-gradient(135deg, #1B4332 0%, #2D6A4F 100%);
        padding: 0;
        position: relative;
        z-index: 100;
        overflow: hidden;
      }
      .cta-banner::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: radial-gradient(ellipse at 20% 50%, rgba(201, 168, 76, 0.08) 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 50%, rgba(201, 168, 76, 0.05) 0%, transparent 60%);
        pointer-events: none;
      }
      .cta-inner {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px 24px;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 32px;
        position: relative;
      }
      .cta-text {
        flex: 0 0 auto;
        max-width: 280px;
        padding-top: 4px;
      }
      .cta-text h2 {
        font-family: 'Playfair Display', serif;
        font-size: 22px;
        font-weight: 700;
        color: #ffffff;
        margin: 0 0 6px 0;
        line-height: 1.2;
      }
      .cta-text h2 span {
        color: #C9A84C;
      }
      .cta-text p {
        font-family: 'DM Sans', sans-serif;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.7);
        margin: 0;
        line-height: 1.4;
      }
      .cta-form-wrapper {
        flex: 1;
        max-width: 850px;
      }
      .cta-form {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .cta-row-1 {
        display: flex;
        align-items: flex-end;
        gap: 8px;
      }
      .cta-row-2 {
        display: flex;
        align-items: flex-end;
        gap: 8px;
      }
      .cta-field {
        flex: 1;
        min-width: 0;
      }
      .cta-field-info {
        flex: 1;
      }
      .cta-field label,
      .cta-field-info label {
        display: block;
        font-family: 'Space Grotesk', sans-serif;
        font-size: 10px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: rgba(255, 255, 255, 0.5);
        margin-bottom: 4px;
      }
      .cta-field input,
      .cta-field select,
      .cta-field-info input {
        width: 100%;
        padding: 10px 12px;
        font-family: 'DM Sans', sans-serif;
        font-size: 14px;
        color: #2D3436;
        background: rgba(255, 255, 255, 0.95);
        border: 1.5px solid rgba(255, 255, 255, 0.3);
        border-radius: 8px;
        outline: none;
        transition: all 0.2s ease;
        box-sizing: border-box;
      }
      .cta-field input::placeholder,
      .cta-field-info input::placeholder {
        color: #8A8A86;
      }
      .cta-field input:focus,
      .cta-field select:focus,
      .cta-field-info input:focus {
        border-color: #C9A84C;
        box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.2);
      }
      .cta-submit {
        flex: 0 0 auto;
        padding: 10px 20px;
        font-family: 'Space Grotesk', sans-serif;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #000000;
        background: #C9A84C;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s ease;
        white-space: nowrap;
        height: 41px;
      }
      .cta-submit:hover {
        background: #D4B65E;
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(201, 168, 76, 0.3);
      }
      .cta-submit:active {
        transform: translateY(0);
      }
      .cta-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 10px;
      }
      .cta-badge span {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 10px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #C9A84C;
        background: rgba(201, 168, 76, 0.12);
        padding: 3px 10px;
        border-radius: 20px;
      }
      .cta-success {
        display: none;
        text-align: center;
        padding: 20px;
      }
      .cta-success.show {
        display: block;
      }
      .cta-success h3 {
        font-family: 'Playfair Display', serif;
        font-size: 20px;
        color: #ffffff;
        margin: 0 0 8px 0;
      }
      .cta-success p {
        font-family: 'DM Sans', sans-serif;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.7);
        margin: 0;
      }

      /* Mobile responsive */
      @media (max-width: 900px) {
        .cta-inner {
          flex-direction: column;
          align-items: stretch;
          padding: 24px 20px;
          gap: 20px;
        }
        .cta-text {
          max-width: 100%;
          text-align: center;
        }
        .cta-text h2 {
          font-size: 20px;
        }
        .cta-badge {
          justify-content: center;
        }
        .cta-row-1 {
          flex-direction: column;
          gap: 8px;
        }
        .cta-row-2 {
          flex-direction: column;
          gap: 8px;
        }
        .cta-field,
        .cta-field-info {
          min-width: 100%;
        }
        .cta-submit {
          width: 100%;
          padding: 14px 24px;
          font-size: 14px;
          height: auto;
        }
      }
      @media (max-width: 600px) {
        .cta-text h2 {
          font-size: 18px;
        }
        .cta-inner {
          padding: 20px 16px;
          gap: 16px;
        }
      }
    </style>
  </head>

  <body>
    <!-- CTA Form Banner -->
    <div class="cta-banner" id="cta-banner">
      <div class="cta-inner">
        <div class="cta-text">
          <div class="cta-badge">
            <span>&#10003; Free Quote in 24 Hours</span>
          </div>
          <h2>Get Your Free <span>Factory-Direct</span> Quote</h2>
          <p>Tell us what you need and we'll show you how much you could save by going direct. No brokers. No obligation.</p>
        </div>
        <div class="cta-form-wrapper">
          <form class="cta-form" id="cta-form" action="https://formspree.io/f/xqegqpbp" method="POST">
            <!-- Formspree configuration -->
            <input type="hidden" name="_subject" value="New Quote Request from weprintcatalogues.com">
            <input type="text" name="_gotcha" style="display:none">

            <!-- Row 1: Name, Company, Email, Phone, Dropdown, Submit -->
            <div class="cta-row-1">
              <div class="cta-field">
                <label for="cta-name">Name</label>
                <input type="text" id="cta-name" name="name" placeholder="Your name" required>
              </div>
              <div class="cta-field">
                <label for="cta-company">Company</label>
                <input type="text" id="cta-company" name="company" placeholder="Company name">
              </div>
              <div class="cta-field">
                <label for="cta-email">Email</label>
                <input type="email" id="cta-email" name="email" placeholder="you@company.com" required>
              </div>
              <div class="cta-field">
                <label for="cta-phone">Phone</label>
                <input type="tel" id="cta-phone" name="phone" placeholder="Phone number">
              </div>
              <div class="cta-field">
                <label for="cta-message">What do you need?</label>
                <select id="cta-message" name="requirement">
                  <option value="Product Catalogue">Product Catalogue</option>
                  <option value="Trade Directory">Trade Directory</option>
                  <option value="Parts Manual">Parts Manual</option>
                  <option value="Brochure / Lookbook">Brochure / Lookbook</option>
                  <option value="Price List">Price List</option>
                  <option value="Other">Other</option>
                </select>
              </div>
              <button type="submit" class="cta-submit">Get My Free Quote &rarr;</button>
            </div>

            <!-- Row 2: More Info (optional) -->
            <div class="cta-row-2">
              <div class="cta-field-info">
                <label for="cta-info">More Info <span style="font-weight:400;text-transform:none;letter-spacing:0;opacity:0.7;">(optional)</span></label>
                <input type="text" id="cta-info" name="more_info" placeholder="Tell us more about your project, e.g. page count, quantity, deadline...">
              </div>
            </div>
          </form>
          <div class="cta-success" id="cta-success">
            <h3>&#10003; Thank You!</h3>
            <p>We've received your enquiry and will get back to you within 24 hours with a no-obligation quote.</p>
          </div>
        </div>
      </div>
    </div>

    <div id="root"></div>

    <script>
      // Handle form submission via Formspree with AJAX for better UX
      document.addEventListener('DOMContentLoaded', function() {
        var form = document.getElementById('cta-form');
        var successMsg = document.getElementById('cta-success');
        if (form) {
          form.addEventListener('submit', function(e) {
            e.preventDefault();
            var data = new FormData(form);
            fetch(form.action, {
              method: 'POST',
              body: data,
              headers: { 'Accept': 'application/json' }
            }).then(function(response) {
              if (response.ok) {
                form.style.display = 'none';
                successMsg.classList.add('show');
                form.reset();
              } else {
                alert('Oops! Something went wrong. Please try again or call us directly.');
              }
            }).catch(function() {
              alert('Oops! Something went wrong. Please try again or call us directly.');
            });
          });
        }
      });
    </script>
  </body>

</html>
